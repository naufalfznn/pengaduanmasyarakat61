<div class="container mt-5">
    <div class="card">
        <div class="card-header text-center">
            <h2>Profil Pengguna</h2>
        </div>
        <div class="card-body text-center">
            {% if user.image %}
                <img src="{{ user.image.url }}" class="rounded-circle" width="150" height="150">
            {% else %}
                <img src="/static/images/default-profile.png" class="rounded-circle" width="150" height="150">
            {% endif %}
            <h4 class="mt-3">{{ masyarakat.nama }}</h4>
            <p><strong>NIK:</strong> {{ request.session.user_id }}</p>
            <p><strong>Nama:</strong> {{ request.session.nama}}</p>
            <p><strong>Username:</strong> {{ request.session.username }}</p>
            <p><strong>Telepon:</strong> {{ request.session.telp }}</p>
            <p><strong>Role:</strong> {{ request.session.user_role }}</p>
            <a href="" class="btn btn-primary">Edit Profil</a>
        </div>
    </div>
</div>
