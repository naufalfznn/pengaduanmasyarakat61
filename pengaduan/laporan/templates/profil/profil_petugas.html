<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Petugas</title>
    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/profil_petugas.css' %}">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow-lg p-4 rounded">
        <div class="text-center">
            <h2 class="mb-4 text-primary"><i class="fas fa-user-circle"></i> Profil Petugas</h2>

            {% if petugas.foto_profil %}
                <img src="{{ petugas.foto_profil.url }}" alt="Foto Profil" class="profile-img mb-3">
            {% else %}
                <div class="alert alert-warning" role="alert">
                    <i class="fas fa-exclamation-circle"></i> Foto profil belum diunggah.
                </div>
            {% endif %}
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-save"></i> Simpan Perubahan
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'dashboard_petugas' %}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
