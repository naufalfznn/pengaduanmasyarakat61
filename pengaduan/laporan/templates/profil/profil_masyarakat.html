<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Masyarakat</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/promas.css' %}">
</head>
<body>

<div class="profile-container">
    <h2>Profil</h2>
    {% if masyarakat.foto_profil %}
        <img src="{{ masyarakat.foto_profil.url }}" alt="Foto Profil" class="profile-picture">
    {% else %}
        <p>Foto profil belum diunggah.</p>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Simpan Perubahan</button>
    </form>

    <a href="{% url 'dashboard_masyarakat' %}" class="back-link">Kembali ke Dashboard</a>
</div>

</body>
</html>
